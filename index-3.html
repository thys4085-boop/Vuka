<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>VukaRide – Book a Ride</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--bg:#0d0d10;--card:#161618;--card2:#1e1e22;--accent:#f5a623;--text:#f0f0f5;--muted:#7a7a8c;--border:rgba(255,255,255,0.08);--green:#25D366}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden}
    #map{position:fixed;inset:0;z-index:0}
    .fade{position:fixed;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,var(--bg) 45%,transparent);z-index:1;pointer-events:none}
    /* TOP */
    .top{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(13,13,16,.97) 70%,transparent)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;color:var(--text);letter-spacing:-.4px}
    .logo b{color:var(--accent)}
    .badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--accent);font-weight:600}
    /* PILL */
    .pill{position:fixed;top:64px;left:14px;right:14px;z-index:10;background:rgba(22,22,24,.93);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:13px;padding:10px 13px;display:flex;align-items:center;gap:10px}
    .pdot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(245,166,35,.2);flex-shrink:0;animation:glow 2s infinite}
    @keyframes glow{0%,100%{box-shadow:0 0 0 4px rgba(245,166,35,.2)}50%{box-shadow:0 0 0 8px rgba(245,166,35,.06)}}
    .pn{font-size:13px;font-weight:500}.ps{font-size:11px;color:var(--muted);margin-top:1px}
    /* SHEET */
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:0 14px 26px;animation:sup .5s cubic-bezier(.16,1,.3,1) both}
    .wbar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 13px;display:flex;align-items:center;gap:11px;margin-bottom:11px;cursor:pointer;transition:.18s}
    .wbar:active{background:var(--card2)}
    .wi{width:34px;height:34px;border-radius:9px;background:rgba(245,166,35,.13);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .wt{flex:1}.wt strong{font-size:14px;font-weight:500;display:block}.wt small{font-size:12px;color:var(--muted)}
    .wa{color:var(--muted);font-size:20px}
    .qrow{display:flex;gap:8px;margin-bottom:11px}
    .qb{flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:10px 5px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:.18s}
    .qb:active{transform:scale(.93)}
    .qb .qi{font-size:19px}.qb .ql{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
    .bbtn{width:100%;background:var(--accent);color:#000;border:none;border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:.18s}
    .bbtn:active{transform:scale(.98);opacity:.9}
    /* MODAL */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(5px);z-index:20;display:none;align-items:flex-end}
    .ov.open{display:flex}
    .mod{width:100%;background:var(--card);border-radius:22px 22px 0 0;padding:18px 16px 34px;position:relative;animation:sup .38s cubic-bezier(.16,1,.3,1) both;max-height:92vh;overflow-y:auto}
    .hdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .mt{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:14px}
    .mc{position:absolute;top:16px;right:14px;background:var(--card2);border:none;color:var(--muted);width:29px;height:29px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .fi{margin-bottom:10px}
    .fi label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:5px;margin-bottom:4px}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .dg{background:#4cff8f}.dr{background:#ff5050}
    input,select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;-webkit-appearance:none}
    input:focus,select:focus{border-color:rgba(245,166,35,.45)}
    input::placeholder{color:var(--muted)}
    select option{background:#1e1e22}
    .rtypes{display:flex;gap:7px;margin:12px 0}
    .rt{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:10px 5px;text-align:center;cursor:pointer;transition:.18s}
    .rt.sel{border-color:var(--accent);background:rgba(245,166,35,.09)}
    .rt .ri{font-size:21px}.rt .rn{font-size:11px;font-weight:600;color:var(--text);margin:3px 0 2px}
    .rt.sel .rn{color:var(--accent)}.rt .rp{font-size:11px;color:var(--muted)}
    .fbar{background:var(--card2);border-radius:10px;padding:9px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
    .fl{font-size:13px;color:var(--muted)}.fa{color:var(--accent);font-weight:700;font-size:16px;font-family:'Syne',sans-serif}
    .cbtn{width:100%;background:var(--green);color:#fff;border:none;border-radius:13px;padding:15px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:.18s}
    .cbtn:active{transform:scale(.98);opacity:.9}
    .toast{position:fixed;bottom:100px;left:14px;right:14px;background:var(--green);color:#fff;border-radius:12px;padding:13px 16px;font-weight:600;font-size:14px;z-index:30;text-align:center;opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}
    .hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;background:rgba(13,13,16,.8);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:9px;padding:7px 13px;font-size:12px;color:var(--muted);pointer-events:none;opacity:0;transition:.4s}
    .hint.show{opacity:1}
    .nav-link{display:block;text-align:center;color:var(--muted);font-size:12px;margin-top:10px;text-decoration:none}
    .nav-link span{color:var(--accent);font-weight:600}
    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
  </style>
</head>
<body>
<div id="map"></div>
<div class="fade"></div>
<div class="hint" id="hint">📍 Tap map to drop pickup pin</div>

<div class="top">
  <div class="logo">Vuka<b>Ride</b></div>
  <div class="badge">📍 Kroonstad</div>
</div>

<div class="pill">
  <div class="pdot"></div>
  <div><div class="pn" id="pn">Kroonstad, Free State</div><div class="ps" id="ps">Tap map to pin your pickup</div></div>
</div>

<div class="sheet">
  <div class="wbar" onclick="openMod()">
    <div class="wi">🔍</div>
    <div class="wt"><strong>Where to?</strong><small>Tap to book your ride</small></div>
    <div class="wa">›</div>
  </div>
  <div class="qrow">
    <div class="qb" onclick="qd('Kroonstad Hospital')"><div class="qi">🏥</div><div class="ql">Hospital</div></div>
    <div class="qb" onclick="qd('Checkers Kroonstad CBD')"><div class="qi">🛒</div><div class="ql">Shops</div></div>
    <div class="qb" onclick="qd('Kroonstad Train Station')"><div class="qi">🚉</div><div class="ql">Station</div></div>
    <div class="qb" onclick="qd('Brentpark Kroonstad')"><div class="qi">🏘️</div><div class="ql">Brentpark</div></div>
  </div>
  <button class="bbtn" onclick="openMod()">Book a Ride &nbsp;→</button>
  <a class="nav-link" href="driver.html">Are you a driver? <span>Open Driver App →</span></a>
</div>

<div class="ov" id="mod" onclick="oc(event)">
  <div class="mod">
    <div class="hdl"></div>
    <button class="mc" onclick="closeMod()">✕</button>
    <div class="mt">🚗 Book Your Ride</div>
    <div class="fi"><label>👤 Your Name</label><input id="nm" type="text" placeholder="e.g. Thabo Mokoena"/></div>
    <div class="fi"><label>📞 Your Number</label><input id="ph" type="tel" placeholder="e.g. 082 123 4567"/></div>
    <div class="fi"><label><span class="dot dg"></span> Pickup</label><input id="pu" type="text" placeholder="Street / area in Kroonstad"/></div>
    <div class="fi"><label><span class="dot dr"></span> Drop-off</label><input id="dr" type="text" placeholder="Where are you going?"/></div>
    <div class="rtypes">
      <div class="rt sel" onclick="pt(this,'Economy','R50–70')"><div class="ri">🚗</div><div class="rn">Economy</div><div class="rp">R50–70</div></div>
      <div class="rt" onclick="pt(this,'Comfort','R80–100')"><div class="ri">🚙</div><div class="rn">Comfort</div><div class="rp">R80–100</div></div>
      <div class="rt" onclick="pt(this,'XL/Minibus','R120–160')"><div class="ri">🚐</div><div class="rn">XL</div><div class="rp">R120–160</div></div>
    </div>
    <div class="fbar"><span class="fl">Estimated Fare</span><span class="fa" id="fa">R50–70</span></div>
    <button class="cbtn" onclick="sendWA()"><span style="font-size:20px">💬</span>Confirm & Send via WhatsApp</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── MAP (OpenStreetMap tiles — reliable for business) ──
  const KSD = [-27.6508, 27.2289];
  const map = L.map('map',{zoomControl:false,attributionControl:false}).setView(KSD,14);

  // Primary: OpenStreetMap. Fallback handled by browser cache.
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

  const mkIcon = c => L.divIcon({className:'',html:`<div style="width:14px;height:14px;background:${c};border-radius:50%;border:3px solid #0d0d10;box-shadow:0 0 0 5px ${c}44"></div>`,iconSize:[14,14],iconAnchor:[7,7]});

  let uMark = L.marker(KSD,{icon:mkIcon('#f5a623')}).addTo(map);
  let pinned=false;

  setTimeout(()=>{const h=document.getElementById('hint');h.classList.add('show');setTimeout(()=>h.classList.remove('show'),3000)},1600);

  navigator.geolocation && navigator.geolocation.getCurrentPosition(p=>{
    const ll=[p.coords.latitude,p.coords.longitude];
    if(!pinned){uMark.setLatLng(ll);map.setView(ll,15);document.getElementById('pn').textContent='Your Location';document.getElementById('ps').textContent=ll[0].toFixed(4)+', '+ll[1].toFixed(4);}
  },()=>{});

  map.on('click',e=>{
    pinned=true;uMark.setLatLng(e.latlng);
    const c=e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5);
    document.getElementById('pu').value=c;
    document.getElementById('pn').textContent='Pin set on map';
    document.getElementById('ps').textContent=c;
  });

  function openMod(){document.getElementById('mod').classList.add('open')}
  function closeMod(){document.getElementById('mod').classList.remove('open')}
  function oc(e){if(e.target===document.getElementById('mod'))closeMod()}
  function qd(n){document.getElementById('dr').value=n;openMod()}

  let sType='Economy',sFare='R50–70';
  function pt(el,t,f){document.querySelectorAll('.rt').forEach(r=>r.classList.remove('sel'));el.classList.add('sel');sType=t;sFare=f;document.getElementById('fa').textContent=f}

  function sendWA(){
    const nm=document.getElementById('nm').value.trim();
    const ph=document.getElementById('ph').value.trim();
    const pu=document.getElementById('pu').value.trim();
    const dr=document.getElementById('dr').value.trim();
    if(!nm){hl('nm','Enter your name');return}
    if(!pu){hl('pu','Enter pickup location');return}
    if(!dr){hl('dr','Enter destination');return}
    const t=new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
    const msg=`🚗 *NEW VUKARIDE BOOKING*\n\n👤 *Name:* ${nm}\n📞 *Phone:* ${ph||'Not given'}\n📍 *Pickup:* ${pu}\n🏁 *Drop-off:* ${dr}\n🚘 *Ride type:* ${sType}\n💰 *Est. fare:* ${sFare}\n🕐 *Time:* ${t}\n\n_VukaRide Kroonstad_`;
    closeMod();
    showT('✅ Opening WhatsApp…');
    setTimeout(()=>window.open('https://wa.me/27760175307?text='+encodeURIComponent(msg),'_blank'),400);
  }
  function hl(id,msg){const el=document.getElementById(id);el.style.borderColor='#ff5050';el.focus();el.placeholder=msg;setTimeout(()=>el.style.borderColor='',2000)}
  function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
</script>
</body>
</html>
