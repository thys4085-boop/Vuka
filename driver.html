<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>VukaRide – Driver</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--bg:#0d0d10;--card:#161618;--card2:#1e1e22;--accent:#f5a623;--text:#f0f0f5;--muted:#7a7a8c;--border:rgba(255,255,255,0.08);--green:#25D366;--red:#ff4d4d}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden}
    #map{position:fixed;inset:0;z-index:0}
    .fade{position:fixed;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,var(--bg) 50%,transparent);z-index:1;pointer-events:none}
    .top{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(13,13,16,.97) 70%,transparent)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--text);letter-spacing:-.4px}
    .logo b{color:var(--accent)}
    .dtag{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--accent);font-weight:700}

    /* STATUS BAR */
    .sbar{position:fixed;top:62px;left:14px;right:14px;z-index:10;background:rgba(22,22,24,.93);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:13px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .sinfo{display:flex;align-items:center;gap:9px}
    .sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:.3s}
    .sdot.online{background:#4cff8f;box-shadow:0 0 0 4px rgba(76,255,143,.2)}
    .sdot.offline{background:var(--muted);box-shadow:none}
    .sdot.busy{background:var(--accent);box-shadow:0 0 0 4px rgba(245,166,35,.2);animation:glow 1.5s infinite}
    @keyframes glow{0%,100%{box-shadow:0 0 0 4px rgba(245,166,35,.2)}50%{box-shadow:0 0 0 8px rgba(245,166,35,.06)}}
    .stext .sn{font-size:13px;font-weight:500}.stext .ss{font-size:11px;color:var(--muted);margin-top:1px}
    .stoggle{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;transition:.2s;white-space:nowrap}
    .stoggle.go{background:rgba(76,255,143,.15);border-color:rgba(76,255,143,.35);color:#4cff8f}
    .stoggle.stop{background:rgba(255,77,77,.12);border-color:rgba(255,77,77,.3);color:var(--red)}

    /* SHEET */
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:0 14px 26px;animation:sup .5s cubic-bezier(.16,1,.3,1) both}

    /* STATS ROW */
    .stats{display:flex;gap:9px;margin-bottom:11px}
    .stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center}
    .sv{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

    /* BOOKING CARD */
    .bcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 13px;margin-bottom:11px}
    .bcard-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .bcard-title span{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
    .brow{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
    .brow:last-child{margin-bottom:0}
    .bico{font-size:16px;flex-shrink:0;margin-top:1px}
    .blabel{font-size:11px;color:var(--muted)}.bval{font-size:14px;font-weight:500;color:var(--text);margin-top:1px}
    .empty{text-align:center;padding:18px 0;color:var(--muted);font-size:13px}

    /* BUTTONS */
    .btnrow{display:flex;gap:9px}
    .abtn{flex:1;border:none;border-radius:13px;padding:15px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.18s}
    .abtn:active{transform:scale(.97)}
    .abtn.wa{background:var(--green);color:#fff}
    .abtn.nav{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);color:var(--accent)}
    .abtn.done{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

    .nav-link{display:block;text-align:center;color:var(--muted);font-size:12px;margin-top:10px;text-decoration:none}
    .nav-link span{color:var(--accent);font-weight:600}

    .toast{position:fixed;bottom:100px;left:14px;right:14px;background:var(--accent);color:#000;border-radius:12px;padding:13px 16px;font-weight:700;font-size:14px;z-index:30;text-align:center;opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}

    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .leaflet-control-attribution,.leaflet-control-zoom{display:none!important}

    /* INCOMING MODAL */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:20;display:none;align-items:flex-end}
    .ov.open{display:flex}
    .mod{width:100%;background:var(--card);border-radius:22px 22px 0 0;padding:18px 16px 34px;animation:sup .38s cubic-bezier(.16,1,.3,1) both}
    .hdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .mt{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .fi{margin-bottom:10px}
    .fi label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px;display:block}
    input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s}
    input:focus{border-color:rgba(245,166,35,.45)}
    input::placeholder{color:var(--muted)}
    .sbtn{width:100%;background:var(--accent);color:#000;border:none;border-radius:13px;padding:15px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:.18s;margin-top:4px}
    .sbtn:active{transform:scale(.98)}
  </style>
</head>
<body>
<div id="map"></div>
<div class="fade"></div>

<div class="top">
  <div class="logo">Vuka<b>Ride</b></div>
  <div class="dtag">🚗 Driver App</div>
</div>

<div class="sbar">
  <div class="sinfo">
    <div class="sdot offline" id="sdot"></div>
    <div class="stext">
      <div class="sn" id="sname">Offline</div>
      <div class="ss" id="ssub">Go online to receive bookings</div>
    </div>
  </div>
  <button class="stoggle go" id="stgl" onclick="toggleStatus()">Go Online</button>
</div>

<div class="sheet">
  <div class="stats">
    <div class="stat"><div class="sv" id="sTrips">0</div><div class="sl">Trips Today</div></div>
    <div class="stat"><div class="sv" id="sEarn">R0</div><div class="sl">Earned</div></div>
    <div class="stat"><div class="sv" id="sRating">5.0</div><div class="sl">Rating</div></div>
  </div>

  <div class="bcard" id="bookingCard">
    <div class="bcard-title"><span></span>Current Booking</div>
    <div class="empty" id="noBook">No active booking.<br>Go online to receive rides.</div>
    <div id="bookDetails" style="display:none">
      <div class="brow"><div class="bico">👤</div><div><div class="blabel">Passenger</div><div class="bval" id="bName">–</div></div></div>
      <div class="brow"><div class="bico">📞</div><div><div class="blabel">Phone</div><div class="bval" id="bPhone">–</div></div></div>
      <div class="brow"><div class="bico">📍</div><div><div class="blabel">Pickup</div><div class="bval" id="bPickup">–</div></div></div>
      <div class="brow"><div class="bico">🏁</div><div><div class="blabel">Drop-off</div><div class="bval" id="bDrop">–</div></div></div>
      <div class="brow"><div class="bico">💰</div><div><div class="blabel">Fare</div><div class="bval" id="bFare">–</div></div></div>
    </div>
  </div>

  <div class="btnrow" id="actionBtns" style="display:none">
    <button class="abtn wa" onclick="callPassenger()"><span>📞</span>Call</button>
    <button class="abtn nav" onclick="navigate()"><span>🗺️</span>Navigate</button>
    <button class="abtn done" onclick="completeTrip()"><span>✅</span>Done</button>
  </div>

  <div class="btnrow" style="margin-top:11px" id="enterBookBtn">
    <button class="abtn nav" style="background:var(--card);border:1px solid var(--border);color:var(--muted)" onclick="openMod()">
      <span>📋</span>Enter Booking Manually
    </button>
  </div>

  <a class="nav-link" href="index.html">← Back to Passenger App</a>
</div>

<!-- MANUAL ENTRY MODAL -->
<div class="ov" id="mod" onclick="oc(event)">
  <div class="mod">
    <div class="hdl"></div>
    <div class="mt">📋 Enter Booking</div>
    <div class="fi"><label>Passenger Name</label><input id="mn" placeholder="From WhatsApp booking"/></div>
    <div class="fi"><label>Phone</label><input id="mp" type="tel" placeholder="Passenger number"/></div>
    <div class="fi"><label>Pickup</label><input id="mpu" placeholder="Pickup address"/></div>
    <div class="fi"><label>Drop-off</label><input id="mdr" placeholder="Destination"/></div>
    <div class="fi"><label>Fare</label><input id="mf" placeholder="e.g. R65"/></div>
    <button class="sbtn" onclick="loadBooking()">Load Trip →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ── MAP ──
  const KSD=[-27.6508,27.2289];
  const map=L.map('map',{zoomControl:false,attributionControl:false}).setView(KSD,14);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

  const mkIcon=c=>L.divIcon({className:'',html:`<div style="width:16px;height:16px;background:${c};border-radius:50%;border:3px solid #0d0d10;box-shadow:0 0 0 6px ${c}44"></div>`,iconSize:[16,16],iconAnchor:[8,8]});

  let driverMark=L.marker(KSD,{icon:mkIcon('#4cff8f')}).addTo(map);
  let watchId=null;

  // ── STATE ──
  let online=false, trips=0, earned=0;
  let currentBooking=null;

  function toggleStatus(){
    online=!online;
    const dot=document.getElementById('sdot');
    const btn=document.getElementById('stgl');
    const name=document.getElementById('sname');
    const sub=document.getElementById('ssub');
    if(online){
      dot.className='sdot online';
      name.textContent='Online – Ready';
      sub.textContent='Waiting for bookings in Kroonstad';
      btn.className='stoggle stop';btn.textContent='Go Offline';
      startTracking();
      showT('🟢 You are now online!');
    } else {
      dot.className='sdot offline';
      name.textContent='Offline';
      sub.textContent='Go online to receive bookings';
      btn.className='stoggle go';btn.textContent='Go Online';
      stopTracking();
      showT('🔴 You are now offline');
    }
  }

  function startTracking(){
    if(!navigator.geolocation)return;
    watchId=navigator.geolocation.watchPosition(p=>{
      const ll=[p.coords.latitude,p.coords.longitude];
      driverMark.setLatLng(ll);
      map.setView(ll,15);
      document.getElementById('ssub').textContent=ll[0].toFixed(4)+', '+ll[1].toFixed(4);
    },()=>{},{ enableHighAccuracy:true });
  }
  function stopTracking(){if(watchId)navigator.geolocation.clearWatch(watchId);watchId=null;}

  // ── BOOKING ──
  function openMod(){document.getElementById('mod').classList.add('open')}
  function oc(e){if(e.target===document.getElementById('mod'))document.getElementById('mod').classList.remove('open')}

  function loadBooking(){
    const n=document.getElementById('mn').value.trim();
    const p=document.getElementById('mp').value.trim();
    const pu=document.getElementById('mpu').value.trim();
    const dr=document.getElementById('mdr').value.trim();
    const f=document.getElementById('mf').value.trim();
    if(!n||!pu||!dr){showT('Please fill in name, pickup & drop-off');return;}
    currentBooking={name:n,phone:p,pickup:pu,dropoff:dr,fare:f||'Agreed'};
    document.getElementById('mod').classList.remove('open');
    showBooking();
  }

  function showBooking(){
    if(!currentBooking)return;
    document.getElementById('noBook').style.display='none';
    document.getElementById('bookDetails').style.display='block';
    document.getElementById('actionBtns').style.display='flex';
    document.getElementById('bName').textContent=currentBooking.name;
    document.getElementById('bPhone').textContent=currentBooking.phone||'Not given';
    document.getElementById('bPickup').textContent=currentBooking.pickup;
    document.getElementById('bDrop').textContent=currentBooking.dropoff;
    document.getElementById('bFare').textContent=currentBooking.fare;
    const dot=document.getElementById('sdot');
    dot.className='sdot busy';
    document.getElementById('sname').textContent='On Trip';
    document.getElementById('ssub').textContent=currentBooking.name+' → '+currentBooking.dropoff;
  }

  function callPassenger(){
    if(!currentBooking||!currentBooking.phone){showT('No phone number for this booking');return;}
    window.open('tel:'+currentBooking.phone.replace(/\s/g,''));
  }

  function navigate(){
    if(!currentBooking)return;
    const dest=encodeURIComponent(currentBooking.dropoff+', Kroonstad');
    window.open('https://www.google.com/maps/dir/?api=1&destination='+dest+'&travelmode=driving','_blank');
  }

  function completeTrip(){
    if(!currentBooking)return;
    trips++;
    const fareNum=parseInt((currentBooking.fare||'0').replace(/\D/g,''))||60;
    earned+=fareNum;
    document.getElementById('sTrips').textContent=trips;
    document.getElementById('sEarn').textContent='R'+earned;
    currentBooking=null;
    document.getElementById('noBook').style.display='block';
    document.getElementById('bookDetails').style.display='none';
    document.getElementById('actionBtns').style.display='none';
    document.getElementById('sdot').className=online?'sdot online':'sdot offline';
    document.getElementById('sname').textContent=online?'Online – Ready':'Offline';
    document.getElementById('ssub').textContent=online?'Waiting for bookings':'Go online to receive bookings';
    showT('✅ Trip complete! Well done 🚗');
  }

  function showT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
</script>
</body>
</html>
